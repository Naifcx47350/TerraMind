server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS — resolve service names at request time, not nginx startup
    # (avoids "host not found in upstream gateway" when gateway starts after frontend)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Same as Vite dev proxy: browser calls /api/* → gateway container
    location /api/ {
        set $gateway_upstream gateway:8000;
        proxy_pass http://$gateway_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # SPA: serve built React files
    location / {
        try_files $uri $uri/ /index.html;
    }
}
